[band.run]
mode = "bands"
hr = "wannier90_hr.dat"
wsvec = ""
kpoints = "KPOINTS"
structure = "wannier90.win"

[band.dos]
mesh = "90x90x1"
sigma = 0.05
npts = 2001
emin = -10.0
emax = 10.0

[band.energy]
shift = -3.60

[band.plot]
targets = ["band", "fatband"]
size = [480, 640]
energy_range = [-1.5, 1.5]
font_size = 18

[band.spin]
enabled = true
layout = "vasp544"

[band.band_plot]
linewidth = 1.4
colors = ["#1f77b4","#d62728"]
ylabel = "Energy (eV)"

[band.dos_plot]
linewidth = 2.0
color = "black"
xlabel = "Energy (eV)"
ylabel = "DOS (states/eV)"

[band.combined_plot]
dos_width_ratio = 0.30

[band.projection]
enabled = true 
mode = "win_groups"
win = "wannier90.win"
plot_style = "empty_circle"
circle_max_size = 5.0
circle_stroke_width = 1.0
groups = [
  ["Mo_dxz", ["Mo"], ["dxz"], "red"],
  ["S_px", ["S"], ["px"], "blue"],
]

[band.sam]
enabled = true
degeneracy_tol = 1.0e-4
