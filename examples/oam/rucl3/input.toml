[band.run]
mode = "bands"
hr = "wannier90_hr.dat"
wsvec = ""
kpoints = "KPOINTS"
structure = "wannier90.win"

[band.energy]
shift = 0.0

[band.plot]
targets = ["oam"]
size = [480, 640]
energy_range = [-4.75, -3.5]
font_size = 18

[band.band_plot]
linewidth = 1.4
colors = ["#1f77b4"]
ylabel = "Energy (eV)"

[band.oam]
enabled = true
orbitals = [
  ["Ru1", "t2g"],
  ["Ru2", "t2g"],
]
degeneracy_tol = 1.0e-4
plot_components = ["Lz"]

[band.projection]
enabled = true
mode = "win_groups"
win = "wannier90.win"
plot_style = "empty_circle"
circle_max_size = 5.0
circle_stroke_width = 1.0
groups = [
  ["Ru_t2g", ["Ru"], ["t2g"], "blue"],
]
